<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inferno Admin | Finance Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

    <style>
        :root { --red: #ff0000; --bg: #050505; --card: #111; --gold: #ffd700; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .header { background: linear-gradient(to right, #400, #000); padding: 15px; border-bottom: 2px solid var(--red); text-align: center; font-weight: bold; flex-shrink: 0; }
        .section { display: none; padding: 15px; flex-grow: 1; overflow-y: auto; padding-bottom: 90px; }
        .section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .admin-panel { background: #1a0000; border: 1px solid var(--red); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .input-box { width: 100%; padding: 12px; margin: 6px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-red { background: var(--red); border: none; color: white; padding: 10px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .card { background: var(--card); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--red); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
        .nav-item { background: none; border: none; color: #555; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--red); }
        .popup { display: none; position: fixed; top: 10%; left: 5%; width: 90%; background: #111; border: 2px solid var(--gold); border-radius: 15px; padding: 20px; z-index: 4000; box-sizing: border-box; }
        .action-btn { font-size: 10px; padding: 5px 10px; margin-top: 5px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="trans-popup" class="popup">
    <h3 style="color:var(--gold); margin:0 0 10px 0;">Transaction Request</h3>
    <p id="trans-msg" style="font-size:12px; color:#ccc;"></p>
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button class="btn-red" style="background:green;" onclick="approveTransAction(true)">APPROVE</button>
        <button class="btn-red" onclick="approveTransAction(false)">REJECT</button>
    </div>
</div>

<div id="auth-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:5000; display:flex; flex-direction:column; justify-content:center; align-items:center;">
    <h2 style="color:var(--red);">INFERNO CORE</h2>
    <div style="width:85%;">
        <input type="email" id="login-email" placeholder="Email" class="input-box">
        <input type="password" id="login-pass" placeholder="Password" class="input-box">
        <button class="btn-red" onclick="handleLogin()">LOGIN</button>
    </div>
</div>

<div class="header">INFERNO FINANCE</div>

<div id="finance" class="section active">
    <div class="admin-panel">
        <input type="number" id="t-amt" placeholder="Amount (₹)" class="input-box">
        <select id="t-type" class="input-box">
            <option value="Salary">Salary</option>
            <option value="Received">Received</option>
        </select>
        <button class="btn-red" onclick="saveTransaction()">ADD TRANSACTION</button>
    </div>
    <div id="ledger-list"></div>
</div>

<div id="chat" class="section"><h3>Team Chat</h3><div id="chat-flow"></div></div>
<div id="vault" class="section"><h3>Vault</h3><div id="vault-content"></div></div>

<nav class="nav-bar">
    <button class="nav-item active" onclick="tab('finance', this)">Ledger</button>
    <button class="nav-item" onclick="tab('chat', this)">Chat</button>
    <button class="nav-item" onclick="tab('vault', this)">Vault</button>
</nav>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBQerQVybTNjnimTbyTuZT_KXK2NCH9oAs",
        authDomain: "admin-20389.firebaseapp.com",
        projectId: "admin-20389",
        storageBucket: "admin-20389.firebasestorage.app",
        messagingSenderId: "853761211030",
        appId: "1:853761211030:web:36154af7589fab5d5f60b7"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let userEmail = "";
    let userRole = "USER";
    let pendingTransId = "";
    let pendingAction = "";

    function handleLogin() {
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-pass').value;
        auth.setPersistence(firebase.auth.Auth.Persistence.SESSION).then(() => {
            return auth.signInWithEmailAndPassword(email, pass);
        }).then((u) => {
            userEmail = u.user.email;
            if(userEmail === "headadmin@ir.com") userRole = "HEAD ADMIN";
            document.getElementById('auth-screen').style.display = "none";
            initListeners();
        });
    }

    function initListeners() {
        // HEAD ADMIN: Monitor for Delete/Change Requests
        if(userRole === "HEAD ADMIN") {
            db.collection("trans_requests").where("status", "==", "pending")
                .onSnapshot(snap => {
                    snap.forEach(doc => {
                        pendingTransId = doc.data().targetId;
                        pendingAction = doc.data().action;
                        const reqId = doc.id;
                        document.getElementById('trans-msg').innerText = `${doc.data().by} wants to ${pendingAction} transaction ₹${doc.data().amt}`;
                        document.getElementById('trans-popup').style.display = "block";
                        window.currentReqDoc = reqId;
                    });
                });
        }

        // Ledger Display
        db.collection("transactions").orderBy("time", "desc").onSnapshot(snap => {
            const list = document.getElementById('ledger-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const id = doc.id;
                let controls = "";
                
                if(userRole === "HEAD ADMIN") {
                    controls = `<button class="action-btn" style="background:#444; color:white;" onclick="deleteTrans('${id}', true)">DELETE</button>`;
                } else {
                    controls = `<button class="action-btn" style="background:#222; color:#888;" onclick="requestTransAction('${id}', '${d.amount}', 'DELETE')">REQ DELETE</button>`;
                }

                list.innerHTML += `<div class="card">
                    <div style="display:flex; justify-content:space-between;">
                        <div><b>₹${d.amount}</b><br><small>${d.type}</small></div>
                        <div style="text-align:right"><small>${d.admin}</small><br>${controls}</div>
                    </div>
                </div>`;
            });
        });
    }

    function saveTransaction() {
        const amt = document.getElementById('t-amt').value;
        const type = document.getElementById('t-type').value;
        if(!amt) return;
        db.collection("transactions").add({
            amount: amt, type, admin: userEmail.split('@')[0],
            role: userRole, time: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('t-amt').value = "";
    }

    // HEAD ADMIN Direct Delete
    function deleteTrans(id, isDirect) {
        if(isDirect && confirm("Delete this record permanently?")) {
            db.collection("transactions").doc(id).delete();
        }
    }

    // STAFF Request Delete
    function requestTransAction(id, amt, action) {
        db.collection("trans_requests").add({
            targetId: id, amt: amt, action: action, by: userEmail,
            status: "pending", time: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("Request sent to HEAD ADMIN.");
    }

    function approveTransAction(granted) {
        if(granted && pendingAction === "DELETE") {
            db.collection("transactions").doc(pendingTransId).delete();
        }
        db.collection("trans_requests").doc(window.currentReqDoc).update({ status: granted ? "approved" : "rejected" });
        document.getElementById('trans-popup').style.display = "none";
    }

    function tab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
</script>
</body>
</html>
